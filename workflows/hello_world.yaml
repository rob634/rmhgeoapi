workflow: hello_world
description: "Two-node test workflow with dependency and receives"
version: 2

parameters:
  message: {type: str, required: true}

nodes:
  greet:
    type: task
    handler: hello_world_greeting
    params: [message]

  reply:
    type: task
    handler: hello_world_reply
    depends_on: [greet]
    receives:
      original_greeting: "greet.greeting"
    params: [message]
