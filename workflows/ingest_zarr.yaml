workflow: ingest_zarr
description: "Unified Zarr ingest: NetCDF or Zarr -> rechunk 256x256 -> flat Zarr v3 -> STAC"
version: 4
reversed_by: unpublish_zarr

# 02 APR 2026: Removed pyramid generation. titiler-xarray does not support
# multiscale pyramid stores (DataTree with /0, /1, /2 groups). It expects a
# single flat Dataset. Rechunking to time=1, spatial=256x256 is sufficient
# for performant tile serving. See PYRAMID_NOTES.md.

parameters:
  source_url: {type: str, required: true}
  source_account: {type: str, required: true}
  collection_id: {type: str, required: true}
  stac_item_id: {type: str, required: true}
  dataset_id: {type: str, required: true}
  resource_id: {type: str, required: true}
  access_level: {type: str, default: "internal"}
  target_container: {type: str, default: "silver-zarr"}
  target_prefix: {type: str, required: true}
  spatial_chunk_size: {type: int, default: 256}
  zarr_format: {type: int, default: 3}
  dry_run: {type: bool, default: true}
  release_id: {type: str, required: false}

nodes:
  # -- Source acquisition ------------------------------------------
  # NOTE: For native Zarr inputs (.zarr suffix), this node does NOT
  # download to the mount. Zarr is cloud-native — the handler detects
  # the .zarr suffix, skips the mount copy, and returns the abfs://
  # cloud URL as "mount_path". Downstream handlers (validate, rechunk)
  # detect the URL scheme and open with storage_options.
  # NetCDF inputs are still downloaded to mount (not cloud-native).
  download_to_mount:
    type: task
    handler: zarr_download_to_mount
    params: [source_url, source_account, dry_run]

  # -- Validate source and detect input type -----------------------
  # mount_path may be a local path (NetCDF) or abfs:// URL (Zarr)
  validate:
    type: task
    handler: zarr_validate_source
    depends_on: [download_to_mount]
    params: [dataset_id, resource_id]
    receives:
      mount_path: "download_to_mount.mount_path"

  # -- Route: NetCDF or Zarr --------------------------------------
  detect_type:
    type: conditional
    depends_on: [validate]
    condition: "validate.input_type"
    branches:
      - name: netcdf_path
        condition: "eq netcdf"
        next: [convert_to_zarr]
      - name: zarr_path
        default: true
        next: [rechunk]

  # -- PATH A: NetCDF -> convert to flat Zarr with optimal chunking -
  convert_to_zarr:
    type: task
    handler: netcdf_convert_and_pyramid
    params: [target_container, target_prefix,
             spatial_chunk_size, zarr_format, dry_run, dataset_id]
    receives:
      mount_path: "validate.mount_path"
      file_list: "validate.file_list"
      dimensions: "validate.dimensions"

  # -- PATH B: Zarr -> rechunk (skip if 256/512) ------------------
  # mount_path is an abfs:// cloud URL for Zarr — reads directly from blob
  rechunk:
    type: task
    handler: ingest_zarr_rechunk
    params: [target_container, target_prefix,
             spatial_chunk_size, zarr_format, dry_run]
    receives:
      mount_path: "validate.mount_path"
      current_chunks: "validate.current_chunks"
      dimensions: "validate.dimensions"

  # -- Register metadata (both paths converge) ---------------------
  register:
    type: task
    handler: zarr_register_metadata
    depends_on:
      - "convert_to_zarr?"
      - "rechunk?"
    params: [stac_item_id, collection_id, dataset_id, resource_id, access_level,
             target_container, target_prefix, dry_run, release_id]
    receives:
      spatial_extent: "validate.spatial_extent"

  # -- STAC materialization ----------------------------------------
  materialize_item:
    type: task
    handler: stac_materialize_item
    depends_on: [register]
    params: [collection_id, dry_run]
    receives:
      cog_id: "register.result.zarr_id"

  materialize_collection:
    type: task
    handler: stac_materialize_collection
    depends_on: [materialize_item]
    params: [collection_id, dry_run]

finalize:
  handler: raster_finalize
