workflow: process_raster
description: "Unified raster ETL: routes to single COG or tiled COGs based on file size"
version: 2

parameters:
  blob_name: {type: str, required: true}
  container_name: {type: str, required: true}
  collection_id: {type: str, required: true}
  output_blob_name: {type: str, required: true}
  processing_options:
    type: dict
    default: {}
  # Platform metadata (passthrough for STAC + app table writes)
  dataset_id: {type: str, required: false}
  resource_id: {type: str, required: false}
  version_id: {type: str, required: false}
  stac_item_id: {type: str, required: false}
  access_level: {type: str, required: false}
  title: {type: str, required: false}
  tags: {type: list, required: false}
  release_id: {type: str, required: false}
  asset_id: {type: str, required: false}

nodes:
  # -- SHARED: Download + Validate (both paths) --
  download_source:
    type: task
    handler: raster_download_source
    params: [blob_name, container_name]

  validate:
    type: task
    handler: raster_validate_atomic
    depends_on: [download_source]
    params: [blob_name, container_name, processing_options]
    receives:
      source_path: "download_source.result.source_path"

  # -- ROUTING: Size-based conditional --
  route_by_size:
    type: conditional
    depends_on: [validate]
    condition: "download_source.result.file_size_bytes"
    branches:
      - name: large_raster
        condition: "gt 2000000000"
        next: [generate_tiling_scheme]
      - name: standard_raster
        default: true
        next: [create_single_cog]

  # -- PATH A: Single COG (<= threshold) --
  create_single_cog:
    type: task
    handler: raster_create_cog_atomic
    params: [output_blob_name, processing_options]
    receives:
      source_path: "download_source.result.source_path"
      source_crs: "validate.result.source_crs"
      target_crs: "validate.result.target_crs"
      needs_reprojection: "validate.result.needs_reprojection"
      raster_type: "validate.result.raster_type"
      nodata: "validate.result.nodata"

  upload_single_cog:
    type: task
    handler: raster_upload_cog
    depends_on: [create_single_cog]
    params: [collection_id, blob_name]
    receives:
      cog_path: "create_single_cog.result.cog_path"
      source_path: "download_source.result.source_path"
      output_blob_name: "create_single_cog.result.cog_blob"

  persist_single:
    type: task
    handler: raster_persist_app_tables
    depends_on: [upload_single_cog]
    params: [collection_id, blob_name, dataset_id, resource_id, version_id, stac_item_id, access_level, title, tags, release_id, asset_id]
    receives:
      stac_item_id: "upload_single_cog.result.stac_item_id"
      silver_container: "upload_single_cog.result.silver_container"
      silver_blob_path: "upload_single_cog.result.silver_blob_path"
      cog_url: "upload_single_cog.result.cog_url"
      cog_size_bytes: "upload_single_cog.result.cog_size_bytes"
      etag: "upload_single_cog.result.etag"
      bounds_4326: "create_single_cog.result.bounds_4326"
      shape: "create_single_cog.result.shape"
      raster_bands: "create_single_cog.result.raster_bands"
      rescale_range: "create_single_cog.result.rescale_range"
      transform: "create_single_cog.result.transform"
      resolution: "create_single_cog.result.resolution"
      crs: "create_single_cog.result.crs"
      compression: "create_single_cog.result.compression"
      tile_size: "create_single_cog.result.tile_size"
      overview_levels: "create_single_cog.result.overview_levels"
      detected_type: "validate.result.raster_type.detected_type"
      band_count: "validate.result.band_count"
      data_type: "validate.result.dtype"
      nodata: "validate.result.nodata"
      source_crs: "validate.result.source_crs"

  # -- PATH B: Tiled COGs (> threshold) --
  generate_tiling_scheme:
    type: task
    handler: raster_generate_tiling_scheme_atomic
    params: [processing_options]
    receives:
      source_path: "download_source.result.source_path"

  process_tiles:
    type: fan_out
    depends_on: [generate_tiling_scheme]
    source: "generate_tiling_scheme.result.tile_specs"
    task:
      handler: raster_process_single_tile
      params:
        tile_spec: "{{ item }}"
        source_path: "{{ nodes.download_source.result.source_path }}"
        collection_id: "{{ inputs.collection_id }}"
        source_crs: "{{ nodes.validate.result.source_crs }}"
        target_crs: "{{ nodes.validate.result.target_crs }}"
        needs_reprojection: "{{ nodes.validate.result.needs_reprojection }}"
        raster_type: "{{ nodes.validate.result.raster_type }}"
        nodata: "{{ nodes.validate.result.nodata }}"

  aggregate_tiles:
    type: fan_in
    depends_on: [process_tiles]
    aggregation: collect

  persist_tiled:
    type: task
    handler: raster_persist_tiled
    depends_on: [aggregate_tiles]
    params: [collection_id, blob_name, dataset_id, resource_id, version_id, stac_item_id, access_level, title, tags, release_id, asset_id]
    receives:
      tile_results: "aggregate_tiles.results"
      source_crs: "validate.result.source_crs"
      detected_type: "validate.result.raster_type.detected_type"
      band_count: "validate.result.band_count"
      data_type: "validate.result.dtype"
      nodata: "validate.result.nodata"

  # -- STAC MATERIALIZATION (both paths converge) --

  materialize_single_item:
    type: task
    handler: stac_materialize_item
    depends_on: [persist_single]
    params: [collection_id]
    receives:
      cog_id: "upload_single_cog.result.stac_item_id"
      blob_path: "upload_single_cog.result.silver_blob_path"

  materialize_collection:
    type: task
    handler: stac_materialize_collection
    depends_on:
      - "materialize_single_item?"
      - "persist_tiled?"
    params: [collection_id]

finalize:
  handler: vector_finalize
