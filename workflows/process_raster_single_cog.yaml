workflow: process_raster_single_cog
description: "Raster file -> COG (single, no tiling) + cog_metadata + render_config + stac_item_json cache"
version: 1

parameters:
  blob_name: {type: str, required: true}
  container_name: {type: str, required: true}
  collection_id: {type: str, required: true}
  output_blob_name: {type: str, required: true}
  processing_options:
    type: dict
    default: {}

nodes:
  download_source:
    type: task
    handler: raster_download_source
    params: [blob_name, container_name]

  validate:
    type: task
    handler: raster_validate_atomic
    depends_on: [download_source]
    params: [blob_name, container_name, processing_options]
    receives:
      source_path: "download_source.result.source_path"

  create_cog:
    type: task
    handler: raster_create_cog_atomic
    depends_on: [validate]
    params: [output_blob_name, processing_options]
    receives:
      source_path: "download_source.result.source_path"
      source_crs: "validate.result.source_crs"
      target_crs: "validate.result.target_crs"
      needs_reprojection: "validate.result.needs_reprojection"
      raster_type: "validate.result.raster_type"
      nodata: "validate.result.nodata"

  upload_cog:
    type: task
    handler: raster_upload_cog
    depends_on: [create_cog]
    params: [collection_id, blob_name]
    receives:
      cog_path: "create_cog.result.cog_path"
      source_path: "download_source.result.source_path"
      output_blob_name: "create_cog.result.cog_blob"

  persist_app_tables:
    type: task
    handler: raster_persist_app_tables
    depends_on: [upload_cog]
    params: [collection_id, blob_name]
    receives:
      stac_item_id: "upload_cog.result.stac_item_id"
      silver_container: "upload_cog.result.silver_container"
      silver_blob_path: "upload_cog.result.silver_blob_path"
      cog_url: "upload_cog.result.cog_url"
      cog_size_bytes: "upload_cog.result.cog_size_bytes"
      etag: "upload_cog.result.etag"
      bounds_4326: "create_cog.result.bounds_4326"
      shape: "create_cog.result.shape"
      raster_bands: "create_cog.result.raster_bands"
      rescale_range: "create_cog.result.rescale_range"
      transform: "create_cog.result.transform"
      resolution: "create_cog.result.resolution"
      crs: "create_cog.result.crs"
      compression: "create_cog.result.compression"
      tile_size: "create_cog.result.tile_size"
      overview_levels: "create_cog.result.overview_levels"
      detected_type: "validate.result.raster_type.detected_type"
      band_count: "validate.result.band_count"
      data_type: "validate.result.dtype"
      nodata: "validate.result.nodata"
      source_crs: "validate.result.source_crs"

finalize:
  handler: vector_finalize
