workflow: vector_docker_etl
description: "Vector file (CSV/SHP/KML/GeoJSON/GPKG) -> PostGIS table(s) + catalog + TiPG"
version: 3
reversed_by: unpublish_vector

parameters:
  blob_name: {type: str, required: true}
  container_name: {type: str, required: true}
  table_name: {type: str, required: true}
  schema_name: {type: str, default: "geo"}
  file_extension: {type: str, required: true}
  processing_options:
    type: dict
    default: {}
  # Platform metadata (passthrough for catalog registration + release lifecycle)
  dataset_id: {type: str, required: false}
  resource_id: {type: str, required: false}
  version_id: {type: str, required: false}
  stac_item_id: {type: str, required: false}
  title: {type: str, required: false}
  description: {type: str, required: false}
  tags: {type: list, required: false}
  access_level: {type: str, required: false}
  release_id: {type: str, required: false}
  asset_id: {type: str, required: false}

validators:
  - type: blob_exists_with_size
    container_param: container_name
    blob_param: blob_name
    zone: bronze
    max_size_mb: 5120
    error_too_large: "Vector source file exceeds 5 GB limit. Split into smaller files or contact admin."

nodes:
  load_source:
    type: task
    handler: vector_load_source
    params: [blob_name, container_name, file_extension, processing_options]

  validate_and_clean:
    type: task
    handler: vector_validate_and_clean
    depends_on: [load_source]
    params: [processing_options]
    receives:
      source_path: "load_source.result.intermediate_path"

  create_and_load_tables:
    type: task
    handler: vector_create_and_load_tables
    depends_on: [validate_and_clean]
    params: [table_name, schema_name, processing_options]
    receives:
      geometry_groups: "validate_and_clean.result.geometry_groups"

  create_split_views:
    type: task
    handler: vector_create_split_views
    depends_on: [create_and_load_tables]
    when: "params.processing_options.split_column"
    params: [table_name, schema_name, processing_options]

  # -- Phase 1: TiPG discovers bare table (browsable, tiles render) --
  # Approvers can preview data before approval. No rich metadata yet.
  # best_effort: TiPG failure doesn't fail the ETL — table is in PostGIS regardless.
  refresh_tipg_preview:
    type: task
    handler: vector_refresh_tipg
    depends_on:
      - create_and_load_tables
      - "create_split_views?"
    params: [table_name, schema_name]
    best_effort: true

  # -- Link table names to release so platform/status can build preview URLs --
  # Runs pre-gate: reviewer needs the viewer_url to approve.
  link_release_tables:
    type: task
    handler: release_link_tables
    depends_on: [refresh_tipg_preview]
    params: [release_id]
    receives:
      tables_created: "create_and_load_tables.result.tables_created"

  # -- APPROVAL GATE (workflow suspends here for human review) --
  approval_gate:
    type: gate
    gate_type: approval
    depends_on:
      - link_release_tables

  # -- Phase 2: Rich metadata stamped after approval (searchable) --
  register_catalog:
    type: task
    handler: vector_register_catalog
    depends_on:
      - approval_gate
      - create_and_load_tables
    params: [table_name, schema_name, blob_name, file_extension, dataset_id, resource_id, version_id, stac_item_id, title, description, tags, access_level, release_id, asset_id]
    receives:
      tables_info: "create_and_load_tables.result.tables_created"
      original_crs: "validate_and_clean.result.crs_input"

  # -- Phase 2 continued: TiPG re-reads enriched metadata --
  # best_effort: TiPG failure after approval doesn't fail the workflow.
  refresh_tipg:
    type: task
    handler: vector_refresh_tipg
    depends_on: [register_catalog]
    params: [table_name, schema_name]
    best_effort: true

finalize:
  handler: vector_finalize
